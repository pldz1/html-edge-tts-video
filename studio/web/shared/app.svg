<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" fill="none">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1F2D3D" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="playGrad" x1="500" y1="430" x2="720" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2F80ED"/>
      <stop offset="1" stop-color="#1F2D3D"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" rx="96" fill="#FFFFFF"/>

  <!-- Unified icon mark -->
  <g filter="url(#softShadow)">
    <path d="M330 300
             C285 300 250 335 250 380
             L250 650
             C250 695 285 730 330 730
             H870
             C915 730 950 695 950 650
             V380
             C950 335 915 300 870 300
             H330Z"
          fill="#FFFFFF" stroke="#263442" stroke-width="28" stroke-linejoin="round"/>

    <!-- subtle internal flow line to suggest transformation -->
    <path d="M430 515 H760" stroke="#D9E2EC" stroke-width="18" stroke-linecap="round"/>

    <!-- code bracket -->
    <path d="M470 430 L385 515 L470 600"
          stroke="#263442" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- slash -->
    <path d="M560 405 L500 625"
          stroke="#263442" stroke-width="30" stroke-linecap="round"/>

    <!-- play triangle integrated as the second code-side element -->
    <path d="M650 410
             C638 402 622 411 622 426
             V604
             C622 620 640 629 652 620
             L790 527
             C801 519 801 502 790 494
             L650 410Z"
          fill="url(#playGrad)"/>
  </g>

  <!-- colored nodes inspired by the original icon -->
  <circle cx="330" cy="300" r="34" fill="#20B7A8"/>
  <circle cx="870" cy="300" r="34" fill="#FFA31A"/>
  <circle cx="330" cy="730" r="34" fill="#FF626A"/>
  <circle cx="870" cy="730" r="34" fill="#78C92A"/>

  <!-- Wordmark -->
  <text x="600" y="880"
        text-anchor="middle"
        font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="112"
        font-weight="700"
        letter-spacing="2"
        fill="#263442">
    HTML<tspan fill="#2F80ED">2</tspan>Video
  </text>

  <text x="600" y="960"
        text-anchor="middle"
        font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="34"
        font-weight="500"
        letter-spacing="8"
        fill="#8A97A6">
    HTML → VIDEO
  </text>
</svg>