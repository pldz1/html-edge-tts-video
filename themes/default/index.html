<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HTML edge-tts Video Factory</title>
  <script>
    document.documentElement.classList.toggle('render-mode', new URLSearchParams(location.search).has('render'));
  </script>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <main id="app" class="composition-shell">
    <section id="stage" class="stage" aria-live="polite"></section>

    <div class="caption-safe">
      <div id="caption" class="caption"></div>
    </div>

    <nav id="chapterRail" class="chapter-rail" aria-label="Video chapters"></nav>

    <audio id="narration" preload="auto" src="/.local/current/assets/narration.mp3"></audio>
  </main>
  <aside class="preview-chrome" aria-label="Preview controls">
    <button id="playButton" class="play-button" type="button">Play</button>
    <input id="scrubber" class="scrubber" type="range" min="0" max="180" step="0.01" value="0" />
    <span id="timecode" class="timecode">00:00.000</span>
    <span id="durationLabel" class="duration-label">00:00</span>
  </aside>
  <script src="runtime.js"></script>
</body>
</html>
