<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>edge-tts Voice Preview</title>
  <link rel="stylesheet" href="voices.css" />
</head>
<body class="voice-page">
  <main class="voice-shell">
    <header class="voice-header">
      <div class="brand-block">
        <div class="brand-mark">VO</div>
        <div>
          <div class="eyebrow">EDGE TTS / VOICE PREVIEW</div>
          <h1>Voice Preview</h1>
          <p class="header-copy">试听 edge-tts 中文声线，选定后用于 Studio 的 TTS 生成。</p>
        </div>
      </div>
      <nav class="voice-actions">
        <a href="studio.html">Studio</a>
        <a href="../themes/default/index.html">Preview</a>
        <a href="captions.html">Captions</a>
      </nav>
    </header>

    <section class="voice-summary">
      <div><span>TEXT</span><p id="previewText">loading...</p></div>
      <div><span>RATE</span><p id="previewRate">--</p></div>
      <div><span>PITCH</span><p id="previewPitch">--</p></div>
    </section>

    <section class="voice-workspace">
      <aside class="voice-help">
        <div class="section-label">How it works</div>
        <h2>先生成试听，再打开此页</h2>
        <p>这个页面读取本地生成的 voice preview manifest，不会在线实时请求 edge-tts。</p>
        <code>python main.py voice-preview</code>
      </aside>
      <section id="voiceList" class="voice-list" aria-live="polite"></section>
    </section>
  </main>
  <script src="voices.js"></script>
</body>
</html>
