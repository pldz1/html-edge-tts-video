<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Video Studio</title>
  <link
    rel="stylesheet"
    href="https://cdn.bootcdn.net/ajax/libs/driver.js/1.3.6/driver.min.css"
    onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/driver.js@1.3.6/dist/driver.css'"
  />
  <link rel="stylesheet" href="studio.css" />
  <script
    defer
    src="https://cdn.bootcdn.net/ajax/libs/driver.js/1.3.6/driver.min.js.iife.js"
    onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/driver.js@1.3.6/dist/driver.js.iife.js'"
  ></script>
  <script defer src="https://cdn.jsdelivr.net/npm/lucide@0.513.0/dist/umd/lucide.min.js"></script>
  <script defer src="studio.js"></script>
</head>
<body>
  <main class="studio-app">
    <header class="studio-header">
      <div class="brand-block">
        <div class="brand-mark">VS</div>
        <div>
          <p class="eyebrow">LOCAL VIDEO FACTORY</p>
          <h1>Video Studio</h1>
        </div>
      </div>
      <section class="status-strip" aria-label="Current project status">
        <div>
          <span>当前项目</span>
          <strong id="currentProjectName">未加载</strong>
        </div>
        <div>
          <span>时间线</span>
          <strong id="timelineStatus">待生成</strong>
        </div>
        <div>
          <span>输出</span>
          <strong id="outputStatus">0 个</strong>
        </div>
      </section>
      <nav class="top-actions">
        <button id="tourButton" class="quiet-button" type="button">
          <i data-lucide="map"></i><span>引导</span>
        </button>
        <a class="quiet-button" href="../themes/default/index.html" target="_blank" rel="noreferrer">
          <i data-lucide="monitor-play"></i><span>预览</span>
        </a>
        <a class="quiet-button" href="captions.html" target="_blank" rel="noreferrer">
          <i data-lucide="captions"></i><span>字幕</span>
        </a>
        <a class="quiet-button" href="voices.html" target="_blank" rel="noreferrer">
          <i data-lucide="audio-lines"></i><span>声音</span>
        </a>
      </nav>
    </header>

    <div class="studio-layout">
      <aside class="sidebar">
        <section class="panel">
          <div class="panel-heading">
            <div>
              <p class="section-label">Projects</p>
              <h2>本地项目</h2>
            </div>
            <button id="refreshButton" class="icon-button" type="button" title="刷新">
              <i data-lucide="refresh-cw"></i><span>刷新</span>
            </button>
          </div>
          <button id="loadStarterButton" class="starter-button" type="button">
            <i data-lucide="sparkles"></i>
            <span>加载 starter</span>
          </button>
          <div id="projectList" class="project-list"></div>
        </section>

        <section class="panel compact-panel">
          <p class="section-label">Source</p>
          <p id="currentSourcePath" class="path-text">暂无当前源文件</p>
        </section>
      </aside>

      <section class="workspace">
        <section class="guide-panel">
          <div class="guide-copy">
            <p class="section-label">Next Step</p>
            <h2 id="guideTitle">读取状态中</h2>
            <p id="guideBody">Studio 正在连接本地工厂。</p>
          </div>
          <div id="guideBadge" class="guide-badge">READY</div>
        </section>

        <nav class="view-tabs" aria-label="Studio views">
          <button class="view-tab is-active" type="button" data-view-tab="compose">
            <i data-lucide="wand-sparkles"></i><span>创作导入</span>
          </button>
          <button class="view-tab" type="button" data-view-tab="build">
            <i data-lucide="settings-2"></i><span>构建渲染</span>
          </button>
          <button class="view-tab" type="button" data-view-tab="review">
            <i data-lucide="panel-right-open"></i><span>预览输出</span>
          </button>
        </nav>

        <section class="work-grid view-panel is-active" data-view-panel="compose">
          <section class="panel prompt-panel">
            <div class="panel-heading">
              <div>
                <p class="section-label">Prompt</p>
                <h2>Web AI 提示词</h2>
              </div>
              <button id="copyPromptButton" class="primary-button" type="button">
                <i data-lucide="copy"></i><span>复制</span>
              </button>
            </div>
            <div class="field-grid">
              <label>主题<input id="topicInput" type="text" value="介绍一个本地 HTML edge-tts 视频工厂" /></label>
              <label>受众<input id="audienceInput" type="text" value="想用 AI 快速做中文说明视频的创作者" /></label>
              <label>风格<input id="toneInput" type="text" value="清晰、工程化、少废话" /></label>
              <label>场景数<input id="sceneCountInput" type="number" min="3" max="8" value="5" /></label>
            </div>
            <label class="wide-label">额外要求<textarea id="notesInput">强调只生成 scenes.json 和 body.html，不要生成 app.js、播放控件、章节栏或字幕文件。</textarea></label>
            <textarea id="promptOutput" class="prompt-output code-field" spellcheck="false"></textarea>
            <div class="provider-row">
              <button data-provider="https://chat.openai.com/" type="button">ChatGPT</button>
              <button data-provider="https://claude.ai/new" type="button">Claude</button>
              <button data-provider="https://gemini.google.com/app" type="button">Gemini</button>
            </div>
          </section>

          <section class="panel import-panel">
            <div class="panel-heading">
              <div>
                <p class="section-label">Import</p>
                <h2>粘贴 AI 输出</h2>
              </div>
              <button id="extractButton" class="quiet-button" type="button">
                <i data-lucide="scan-text"></i><span>提取</span>
              </button>
            </div>
            <textarea id="aiResponseInput" class="response-input" spellcheck="false" placeholder="粘贴 Web AI 返回的 scenes.json 和 body.html。"></textarea>
            <div class="save-row">
              <label>项目 slug<input id="projectSlugInput" type="text" value="my-video" /></label>
              <button id="validateExtractedButton" class="quiet-button" type="button">
                <i data-lucide="shield-check"></i><span>校验</span>
              </button>
              <button id="saveProjectButton" class="primary-button" type="button">
                <i data-lucide="save"></i><span>保存并加载</span>
              </button>
            </div>
            <div class="extract-grid">
              <label>scenes.json<textarea id="scenesOutput" class="code-field" spellcheck="false"></textarea></label>
              <label>body.html<textarea id="bodyOutput" class="code-field" spellcheck="false"></textarea></label>
            </div>
          </section>
        </section>

        <section class="panel build-panel view-panel" data-view-panel="build">
          <div class="panel-heading">
            <div>
              <p class="section-label">Build</p>
              <h2>构建与渲染</h2>
            </div>
            <p id="jobStatus" class="job-status">空闲</p>
          </div>
          <div class="build-controls">
            <button id="checkButton" class="quiet-button" type="button">
              <i data-lucide="check-circle-2"></i><span>Check</span>
            </button>
            <button id="offlineButton" class="quiet-button" type="button">
              <i data-lucide="file-video"></i><span>Offline</span>
            </button>
            <button id="ttsButton" class="primary-button" type="button">
              <i data-lucide="radio-tower"></i><span>TTS</span>
            </button>
            <label>尺寸
              <select id="renderSizeInput">
                <option value="720p">720p</option>
                <option value="1080p">1080p</option>
                <option value="2k">2K</option>
                <option value="4k">4K</option>
              </select>
            </label>
            <label>输出名<input id="renderOutputInput" type="text" value="studio-render.mp4" /></label>
            <button id="renderButton" class="primary-button" type="button">
              <i data-lucide="download"></i><span>Render</span>
            </button>
          </div>
          <pre id="jobLog" class="job-log">等待任务。</pre>
        </section>

        <section class="preview-output-grid view-panel" data-view-panel="review">
          <section class="panel preview-panel">
            <div class="panel-heading">
              <div>
                <p class="section-label">Preview</p>
                <h2>当前画面</h2>
              </div>
              <a class="quiet-button" href="../themes/default/index.html" target="_blank" rel="noreferrer">
                <i data-lucide="external-link"></i><span>打开</span>
              </a>
            </div>
            <iframe id="previewFrame" title="Video preview" src="../themes/default/index.html"></iframe>
          </section>

          <section class="panel outputs-panel">
            <div class="panel-heading">
              <div>
                <p class="section-label">Outputs</p>
                <h2>渲染结果</h2>
              </div>
              <button id="refreshOutputsButton" class="icon-button" type="button" title="刷新输出">
                <i data-lucide="refresh-cw"></i><span>刷新</span>
              </button>
            </div>
            <video id="outputPlayer" controls preload="metadata"></video>
            <div id="outputList" class="output-list"></div>
          </section>
        </section>

        <p id="statusText" class="toast-line">Ready.</p>
      </section>
    </div>
  </main>
</body>
</html>
